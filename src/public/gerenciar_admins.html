<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Administradores</title>
    <link rel="stylesheet" href="css/apresentacao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 100px auto 40px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-admin {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .form-admin input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .form-admin button {
            padding: 12px;
            background-color: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .form-admin button:hover {
            background-color: #0b5ed7;
        }
        .voltar-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #0d6efd;
            text-decoration: none;
            font-weight: bold;
        }
        .voltar-btn:hover {
            text-decoration: underline;
        }
        .section-header {
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Barra de Navegação Superior -->
    <div class="navbar">
        <h2><i class="fa-solid fa-user-shield"></i> Painel Administrativo</h2>
    </div>

    <div class="admin-container">
        <a href="apresentacao.html" class="voltar-btn"><i class="fa-solid fa-arrow-left"></i> Voltar ao Painel Principal</a>
        
        <h2 class="section-header">Gerenciar Administradores</h2>
        
        <!-- Formulário de Cadastro e Edição -->
        <form id="formAdmin" class="form-admin">
            <h3>Cadastrar / Editar Administrador</h3>
            <input type="hidden" id="adminId">
            <input type="text" id="nomeAdmin" placeholder="Nome Completo" required>
            <input type="email" id="emailAdmin" placeholder="E-mail de acesso" required>
            <input type="password" id="senhaAdmin" placeholder="Senha do Admin" required>
            <button type="submit">Cadastrar Administrador</button>
        </form>

        <!-- Lista onde o gerenciar_admins.js vai inserir os dados dinamicamente -->
        <h3 class="section-header" style="margin-top: 40px;">Lista de Administradores Secundários</h3>
        <div id="listaAdmins">
            <p style="color: #666; font-style: italic;">Carregando dados dos administradores...</p>
        </div>
    </div>

    <!-- Importa a lógica responsável por gerenciar tudo isso -->
    <script src="js/gerenciar_admins.js"></script>
</body>
</html>

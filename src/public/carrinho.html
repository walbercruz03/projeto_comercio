<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #007BFF; padding-bottom: 10px; }
        .item-carrinho { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-detalhes h4 { font-size: 1.1rem; color: #222; }
        .item-detalhes p { color: #666; font-size: 0.9rem; }
        .item-preco { font-weight: bold; color: #28a745; font-size: 1.1rem; }
        .total-container { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .total-titulo { font-size: 1.3rem; font-weight: bold; color: #333; }
        .total-valor { font-size: 1.6rem; font-weight: bold; color: #28a745; }
        .acoes-carrinho { display: flex; gap: 15px; }
        .btn-voltar { display: inline-block; background-color: #6c757d; color: white; padding: 12px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; flex: 1; text-align: center; }
        .btn-finalizar { display: inline-block; background-color: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; font-size: 1rem; cursor: pointer; flex: 1; text-align: center; }
        .btn-finalizar:hover { background-color: #218838; }
        .btn-limpar { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 0.9rem; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fa-solid fa-cart-shopping"></i> Meu Carrinho</h1>
        
        <div id="listaItens">
            </div>

        <div class="total-container">
            <span class="total-titulo">Total da Compra:</span>
            <span class="total-valor" id="valorTotal">R$ 0,00</span>
        </div>

        <div class="acoes-carrinho">
            <a href="apresentacao.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Continuar Comprando</a>
            <button class="btn-finalizar" id="btnFinalizar" onclick="enviarPedidoAoBanco()"><i class="fa-solid fa-check"></i> Finalizar Compra</button>
        </div>
        
        <button class="btn-limpar" onclick="limparCarrinho()"><i class="fa-solid fa-trash-can"></i> Esvaziar Carrinho</button>
    </div>

    <script src="js/carrinho.js">
    </script>
</body>
</html>

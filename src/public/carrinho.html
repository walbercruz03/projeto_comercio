<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/carrinho.css">
</head>
<body>

    <div class="container">
        <h1><i class="fa-solid fa-cart-shopping"></i> Meu Carrinho</h1>
        
        <div id="listaItens">
            </div>

        <div class="total-container">
            <span class="total-titulo">Total da Compra:</span>
            <span class="total-valor" id="valorTotal">R$ 0,00</span>
        </div>

        <div class="acoes-carrinho">
            <a href="apresentacao.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Continuar Comprando</a>
            <button class="btn-finalizar" id="btnFinalizar" onclick="enviarPedidoAoBanco()"><i class="fa-solid fa-check"></i> Finalizar Compra</button>
        </div>
        
        <button class="btn-limpar" onclick="limparCarrinho()"><i class="fa-solid fa-trash-can"></i> Esvaziar Carrinho</button>
    </div>

    <script src="js/carrinho.js">
    </script>
</body>
</html>

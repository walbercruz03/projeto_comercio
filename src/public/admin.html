<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - Cadastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; padding: 40px 20px; }
        .container { max-width: 600px; background: white; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 20px; color: #333; font-size: 1.8rem; text-align: center; border-bottom: 2px solid #007BFF; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; color: #555; }
        input[type="text"], input[type="number"], textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        textarea { resize: vertical; height: 100px; }
        .btn-enviar { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-enviar:hover { background-color: #218838; }
        .link-loja { display: block; text-align: center; margin-top: 15px; color: #007BFF; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Painel do Admin - Cadastrar Produto</h1>
        
        <form id="formProduto">
            <div class="form-group">
                <label for="nome">Nome do Produto</label>
                <input type="text" id="nome" required placeholder="Ex: Headset Gamer HyperX">
            </div>

            <div class="form-group">
                <label for="preco">Preço (R$)</label>
                <input type="number" id="preco" step="0.01" required placeholder="Ex: 349.90">
            </div>

            <div class="form-group">
                <label for="estoque">Quantidade em Estoque</label>
                <input type="number" id="estoque" required placeholder="Ex: 10">
            </div>

            <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" required placeholder="Digite os detalhes técnicos do produto..."></textarea>
            </div>

            <div class="form-group">
                <label for="imagem">Imagem do Produto</label>
                <input type="file" id="imagem" accept="image/*" required>
            </div>

            <button type="submit" class="btn-enviar">Cadastrar Produto</button>
        </form>

        <a href="apresentacao.html" class="link-loja">Voltar para a Vitrine da Loja</a>
    </div>

   <script src="js/administrador.js">
    
</script>
</body>
</html>

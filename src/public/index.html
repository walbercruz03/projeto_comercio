<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Comércio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">
        <h1>Bem-Vindo</h1>
        <p class="subtitle">Faça login para acessar nossa loja de vendas</p>
        
        <div class="form-group">
            <label for="usuario">E-mail</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="usuario" placeholder="exemplo@email.com" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="senha">Senha</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>
        </div>
        
        <button id="enviar">Entrar no Sistema</button>

        <p class="signup-text">Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
    </div>

    <script src="js/login.js">
        
    </script>
</body>
</html>
